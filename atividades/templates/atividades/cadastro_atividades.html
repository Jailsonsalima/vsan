{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Cadastro de Atividade</h2>
    <form method="post" class="form">
        {% csrf_token %}

        <!--<div class="form-group">
            <label for="tipo_atividade">Atividade:</label>
            <select name="tipo_atividade" id="tipo_atividade" required>
                <option value="Viagem">Viagem</option>
            </select>
        </div>-->
        <div class="form-group">
            <strong>Período da Viagem</strong>
            <label for="data_ida">Data de Ida :</label>
            <input type="date" name="data_ida" id="data_ida" required>
        </div>
        <div class="form-group">
            <label for="data_retorno">Data de Retorno :</label>
            <input type="date" name="data_retorno" id="data_retorno" required>
        </div>
        <div class="form-group">
            <label for="dias_diarias">Nº Dias / Diárias:</label>
            <input type="text" name="dias_diarias" id="dias_diarias" readonly
            style="background-color: #f0f0f0; color: #555; font-weight: bold;">
    <small style="color: #777;">Este campo é preenchido automaticamente.</small>
        </div>
        <div>
            <label>Pernoite:</label>
            <div class="radio-group">
                <div class="radio-group">
                    <input type="radio" id="pernoite_sim" name="pernoite" value="Sim" required>
                    <label for="pernoite_sim">Sim</label>
                </div>
                <div class="radio-group">
                    <input type="radio" id="pernoite_nao" name="pernoite" value="Não" required>
                    <label for="pernoite_nao">Não</label>
                </div>
            </div>
        </div>
         <div class="form-group">
            <label for="transporte">Meio de Transporte:</label>
            <select name="transporte" id="transporte" required>
                <option value="Aéreo">Aéreo</option>
                <option value="Veículo oficial">Veículo oficial</option>
                <option value="Fluvial">Fluvial</option>
            </select>
        </div>
        <div class="form-group">
            <label for="objetivo">Objetivo:</label>
            <textarea name="objetivo" id="objetivo" rows="3" required></textarea>
        </div>
        <div class="form-group">
    <label>Servidores:</label>
    <div id="lista-servidores">
        {% for servidor in servidores %}
            <div>
                <label>
                    <input type="checkbox" name="servidores" value="{{ servidor.id }}">
                    {{ servidor.nome }} - {{ servidor.matricula }}
                </label>
            </div>
        {% endfor %}
    </div>
    <small style="color:#777;">Selecione um ou mais servidores.</small>
</div>

<button id="btn-proximo" type="submit" class="btn btn-disabled btn-secondary" disabled>Salvar</button>


        

    </form>
</div>

<script>

    function calcularDias() {
        const dataIda = document.getElementById("data_ida").value;
        const dataRetorno = document.getElementById("data_retorno").value;
        const pernoiteSim = document.getElementById("pernoite_sim").checked;
        const pernoiteNao = document.getElementById("pernoite_nao").checked;
        const campoDias = document.getElementById("dias_diarias");

        if (!dataIda || !dataRetorno) {
            campoDias.value = "";
            return;
        }

        const ida = new Date(dataIda);
        const retorno = new Date(dataRetorno);

        // diferença em dias (inclui o dia da ida)
        const diffTime = retorno - ida;
        const diffDays = diffTime / (1000 * 60 * 60 * 24) + 1;

        let resultado = "";
        if (pernoiteSim) {
            resultado = `${diffDays} / ${(diffDays - 0.5).toString().replace(".", ",")}`;
        } else if (pernoiteNao) {
            resultado = `${diffDays} / ${(diffDays / 2).toString().replace(".", ",")}`;
        }

        campoDias.value = resultado;
    }

    // Eventos para atualizar em tempo real
    document.getElementById("data_ida").addEventListener("change", calcularDias);
    document.getElementById("data_retorno").addEventListener("change", calcularDias);
    document.getElementById("pernoite_sim").addEventListener("change", function() {
        if (!document.getElementById("data_ida").value || !document.getElementById("data_retorno").value) {
            alert("Preencha primeiro as datas de ida e retorno.");
            this.checked = false;
            return;
        }
        calcularDias();
    });
    document.getElementById("pernoite_nao").addEventListener("change", function() {
        if (!document.getElementById("data_ida").value || !document.getElementById("data_retorno").value) {
            alert("Preencha primeiro as datas de ida e retorno.");
            this.checked = false;
            return;
        }
        calcularDias();
    });
</script>
<script>
    const checkboxes = document.querySelectorAll('input[name="servidores"]');
    const btnProximo = document.getElementById('btn-proximo');

    function atualizarBotao() {
        const algumSelecionado = Array.from(checkboxes).some(c => c.checked);
        btnProximo.disabled = !algumSelecionado;

        if (algumSelecionado) {
            btnProximo.classList.remove('btn-disabled');
            btnProximo.classList.add('btn-secondary'); // azul quando ativo
        } else {
            btnProximo.classList.remove('btn-secondary');
            btnProximo.classList.add('btn-disabled'); // cinza quando desabilitado
        }
    }

    checkboxes.forEach(cb => cb.addEventListener('change', atualizarBotao));
</script>


{% endblock %}
