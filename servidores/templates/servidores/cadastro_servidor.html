{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Cadastro de Servidor</h2>
    <form method="post" class="form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required>
        </div>
        <div class="form-group">
            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" id="endereco" required>
        </div>
        <div class="form-group">
            <label for="vinculo">Vínculo:</label>
            <select name="vinculo" id="vinculo" required>
                <option value="Servidor do Órgão">Servidor do Órgão</option>
                <option value="Servidor Cedido">Servidor Cedido</option>
                <option value="Colaborador Eventual">Colaborador Eventual</option>
            </select>
        </div>
        <div class="form-group">
            <label for="matricula">Matrícula:</label>
            <input type="text" name="matricula" id="matricula" required>
        </div>

        <div class="form-group">
            <label for="lotacao">Lotação :</label>
            <select name="lotacao" id="lotacao" required>
                <option value="">-- Selecione um setor --</option>
                {% for setor in setores %}
                    <option value="{{ setor.id }}">{{ setor.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="cargo">Cargo:</label>
            <input type="text" name="cargo" id="cargo" required>
        </div>

        <div class="form-group">
            <label for="funcao">Função:</label>
            <input type="text" name="funcao" id="funcao" required>
        </div>
        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" id="cpf" required>
        </div>
        <div class="form-group">
            <label for="rg">RG:</label>
            <input type="text" name="rg" id="rg">
        </div>
        <div class="form-group">
            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" name="nascimento" id="nascimento" required>
        </div>
        <div class="form-group">
            <label for="banco">Banco:</label>
            <input type="text" name="banco" id="banco" required>
        </div>
        <div class="form-group">
            <label for="agencia">Agência:</label>
            <input type="text" name="agencia" id="agencia" required>
        </div>
        <div class="form-group">
            <label for="conta">Conta Corrente:</label>
            <input type="text" name="conta" id="conta" required>
        </div>
        <div class="form-group">
            <label for="chefia">Chefia Imediata:</label>
            <input type="text" name="chefia" id="chefia" required>
        </div>
        <button type="submit" class="btn-secondary">Próximo ></button>
    </form>
</div>
<script>
    document.getElementById("matricula").addEventListener("input", function (e) {
        let valor = e.target.value.replace(/\D/g, ""); // remove tudo que não for número
        if (valor.length > 1) {
            // insere '/' antes do último dígito
            valor = valor.slice(0, -1) + "/" + valor.slice(-1);
        }
        e.target.value = valor;
    });
</script>


{% endblock %}
