{% extends "base.html" %}

{% block content %}
<div class="container">
    
    <h2>Cadastro de Servidor (sem vínculo de usuário)</h2>
    <form method="post" class="form">
        {% csrf_token %}

        <div class="form-group">
            <label for="nome">Nome completo:</label>
            <input type="text" name="nome" id="nome" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" name="cpf" id="cpf" required>
            </div>

            <div class="form-group">
                <label for="rg">RG:</label>
                <input type="text" name="rg" id="rg">
            </div>

            <div class="form-group">
                <label for="nascimento">Data de Nascimento:</label>
                <input type="date" name="nascimento" id="nascimento">
            </div>
        </div>

        <div class="form-group">
            <label for="endereco">Endereço:</label>
            <input type="text" name="endereco" id="endereco" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="vinculo">Vínculo:</label>
                <select name="vinculo" id="vinculo" required>
                    <option value="">-- Selecione --</option>
                    <option value="Servidor do Órgão">Servidor do Órgão</option>
                    <option value="Servidor Cedido">Servidor Cedido</option>
                    <option value="Colaborador Eventual">Colaborador Eventual</option>
                </select>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="text" name="matricula" id="matricula" required>
                <small style="color:#777;">Informe a matrícula para que futuros usuários possam ser vinculados.</small>
            </div>

            <div class="form-group">
    <label for="setor">Lotação:</label>
    <select name="setor" id="setor" required>
        <option value="">-- Selecione um setor --</option>
        {% for setor in setores %}
            <option value="{{ setor.id }}">{{ setor.nome }}</option>
        {% endfor %}
    </select>
</div>

        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="cargo">Cargo:</label>
                <select name="cargo" id="cargo" required>
                    <option value="">-- Selecione um cargo --</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Agente Administrativo">Agente Administrativo</option>
                    <option value="Agente de Mecânica">Agente de Mecânica</option>
                    <option value="Agente de Portaria">Agente de Portaria</option>
                    <option value="Agente de Saúde">Agente de Saúde</option>
                    <option value="Agente de Vigilância Sanitária ">Agente de Vigilância Sanitária </option>
                    <option value="Arquiteto">Arquiteto</option>
                    <option value="Biomédico">Biomédico</option>
                    <option value="Comissionado">Comissionado</option>
                    <option value="Enfermeiro">Enfermeiro</option>
                    <option value="Engenheiro">Engenheiro</option>
                    <option value="Engenheiro Cívil">Engenheiro Cívil</option>
                    <option value="Engenheiro Sanitarista">Engenheiro Sanitarista</option>
                    <option value="Farmacêutico">Farmacêutico</option>
                    <option value="Farmaceutico-bioquimico">Farmaceutico-bioquimico</option>
                    <option value="Médico Veterinário">Médico Veterinário</option>
                    <option value="Motorista">Motorista</option>
                    <option value="Nutricionista ">Nutricionista </option>
                    <option value="Nutricionista/SESMA - 2º teto ">Nutricionista/SESMA - 2º teto</option>
                    <option value="Odontologa">Odontologa</option>
                    <option value="Quimico industrial">Quimico industrial</option>
                    <option value="Técnico de enfermagem">Técnico de enfermagem</option>
                </select>
            </div>

            <div class="form-group">
                <label for="funcao">Função:</label>
                <input type="text" name="funcao" id="funcao">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="banco">Banco:</label>
                <input type="text" name="banco" id="banco">
            </div>

            <div class="form-group">
                <label for="agencia">Agência:</label>
                <input type="text" name="agencia" id="agencia">
            </div>

            <div class="form-group">
                <label for="conta">Conta Corrente:</label>
                <input type="text" name="conta" id="conta">
            </div>
        </div>
        <button type="submit" class="btn-secondary">Cadastrar Servidor</button>
    </form>
</div>
{% load static %}
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
