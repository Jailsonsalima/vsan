{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Editar Setor</h2>
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-group">
            <label for="nome">Nome do Setor:</label>
            <input type="text" id="nome" name="nome" value="{{ setor.nome }}" required>
        </div>
        <div class="form-group">
            <label for="chefe_imediato">Chefe Imediato:</label>
            <select id="chefe_imediato" name="chefe_imediato" required>
                <option value="">-- Selecione --</option>
                {% for servidor in servidores %}
                    <option value="{{ servidor.id }}" {% if setor.chefe_imediato.id == servidor.id %}selected{% endif %}>
                        {{ servidor.nome }} - {{ servidor.matricula }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary">Salvar Alterações</button>
    </form>
</div>
{% endblock %}
