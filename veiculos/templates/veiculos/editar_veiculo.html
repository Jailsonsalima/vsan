{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Editar Veículo</h2>
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label>Modelo:</label>
                <input type="text" name="modelo" value="{{ veiculo.modelo }}" required>
            </div>
            <div class="form-group">
                <label>Placa:</label>
                <input type="text" name="placa" value="{{ veiculo.placa }}" required>
            </div>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 150px; justify-content: center;">
            <div class="form-group">
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
            <div class="form-group">
                <button class="btn btn-primary"><a href="{% url 'listar_veiculos' %}" style="color: white; text-decoration: none;">Cancelar</a></button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
