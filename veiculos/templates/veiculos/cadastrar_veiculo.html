{% extends "base.html" %}
{% block content %}
<div class="container">
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label>Modelo:</label>
                <input type="text" name="modelo" required>
            </div>
            <div class="form-group">
                <label>Placa:</label>
                <input type="text" name="placa" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
</div>
{% endblock %}
